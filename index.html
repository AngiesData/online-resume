<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Online resume and professional portfolio">
  <title> Angela | Online Resume</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <main class="resume">
    <aside class="sidebar">
      <div class="profile">
        <!-- Replace profile.png with your own photo, or remove this image. -->
        <img class="profile-photo" src="profile2026.png" alt="Profile Avatar">
        <p class="eyebrow">Online Resume</p>
        <h1 id="name">Your Name</h1>
        <p id="headline" class="headline">Professional Title</p>
      </div>

      <section class="sidebar-section">
        <h2>Contact</h2>
        <div id="contact-list" class="contact-list"></div>
      </section>

      <section class="sidebar-section">
        <h2>Core Skills</h2>
        <div id="skills-list" class="tag-list"></div>
      </section>

      <section class="sidebar-section">
        <h2>Tools</h2>
        <div id="tools-list" class="tag-list"></div>
      </section>

      <section class="sidebar-section">
        <h2>Languages</h2>
        <div id="languages-list" class="tag-list"></div>
      </section>
    </aside>

    <section class="main-content">
      <header class="top-bar">
        <div>
          <p class="section-label">Professional Profile</p>
          <p id="summary" class="summary"></p>
        </div>
        <button id="print-button" class="print-button" type="button">Print / Save PDF</button>
      </header>

      <section class="content-section">
        <div class="section-heading">
          <span>01</span>
          <h2>Professional Experience</h2>
        </div>
        <div id="experience-list"></div>
      </section>

      <section class="content-section">
        <div class="section-heading">
          <span>02</span>
          <h2>Education</h2>
        </div>
        <div id="education-list"></div>
      </section>

      <section class="content-section">
        <div class="section-heading">
          <span>03</span>
          <h2>Courses & Certifications</h2>
        </div>
        <div id="certifications-list"></div>
      </section>

      <section class="content-section">
        <div class="section-heading">
          <span>04</span>
          <h2>Projects</h2>
        </div>
        <div id="projects-list"></div>
      </section>

      <footer>
        <p>Updated <span id="updated-date"></span> · © <span id="year"></span> <span id="footer-name"></span></p>
      </footer>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
